<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التعليم المتوسط | Youcef Exam</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#eef5ff,#ffffff);
}

header{
background:#2563eb;
padding:25px;
text-align:center;
color:white;
font-size:35px;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

p{
text-align:center;
color:#555;
margin:20px;
font-size:18px;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
}

.card{
padding:30px;
border-radius:20px;
text-align:center;
text-decoration:none;
color:white;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.card:hover{
transform:translateY(-10px) scale(1.03);
}

.card h2{
font-size:28px;
margin:15px 0;
}

.card span{
font-size:60px;
display:block;
}

.one{background:#3b82f6;}
.two{background:#10b981;}
.three{background:#f59e0b;}
.four{background:#ef4444;}

.back{
display:block;
width:220px;
margin:30px auto;
padding:15px;
text-align:center;
background:#111827;
color:white;
text-decoration:none;
border-radius:12px;
transition:.3s;
}

.back:hover{
background:#000;
}
</style>

</head>

<body>

<header>
📚 التعليم المتوسط
</header>

<p>اختر السنة الدراسية</p>

<div class="container">

<a href="1am.html" class="card one">
<span>📘</span>
<h2>السنة الأولى متوسط</h2>
</a>

<a href="#" class="card two">
<span>📗</span>
<h2>السنة الثانية متوسط</h2>
</a>

<a href="#" class="card three">
<span>📙</span>
<h2>السنة الثالثة متوسط</h2>
</a>

<a href="#" class="card four">
<span>📕</span>
<h2>السنة الرابعة متوسط</h2>
</a>

</div>

<a class="back" href="index.html">⬅ العودة للرئيسية</a>

</body>
</html>
