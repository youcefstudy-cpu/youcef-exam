<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>متوسط - Youcef Exam</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#4f46e5;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
padding:30px;
text-align:center;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-decoration:none;
color:black;
font-size:24px;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}
</style>

</head>

<body>

<header>
📚 التعليم المتوسط
</header>

<div class="container">

<a class="card" href="#">السنة الأولى متوسط</a>

<a class="card" href="#">السنة الثانية متوسط</a>

<a class="card" href="#">السنة الثالثة متوسط</a>

<a class="card" href="#">السنة الرابعة متوسط</a>

</div>

</body>
</html>
