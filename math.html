<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شعبة الرياضيات | Youcef Exam</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#7c3aed;
color:white;
padding:25px;
text-align:center;
font-size:34px;
font-weight:bold;
}

p{
text-align:center;
margin:20px;
color:#555;
font-size:18px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:18px;
text-decoration:none;
color:#222;
box-shadow:0 8px 20px rgba(0,0,0,.1);
transition:.3s;
text-align:center;
}

.card:hover{
transform:translateY(-8px);
}

.card span{
font-size:50px;
display:block;
margin-bottom:10px;
}

.card h2{
font-size:23px;
}

.back{
display:block;
width:220px;
margin:35px auto;
padding:15px;
background:#111827;
color:white;
text-align:center;
text-decoration:none;
border-radius:12px;
}

.back:hover{
background:#000;
}
</style>

</head>

<body>

<header>
📐 شعبة الرياضيات
</header>

<p>اختر المادة</p>

<div class="container">

<a href="#" class="card">
<span>➗</span>
<h2>الرياضيات</h2>
</a>

<a href="#" class="card">
<span>⚛️</span>
<h2>الفيزياء</h2>
</a>

<a href="#" class="card">
<span>🧪</span>
<h2>علوم طبيعية</h2>
</a>

<a href="#" class="card">
<span>💻</span>
<h2>الإعلام الآلي</h2>
</a>

<a href="#" class="card">
<span>📖</span>
<h2>اللغة العربية</h2>
</a>

<a href="#" class="card">
<span>🇫🇷</span>
<h2>اللغة الفرنسية</h2>
</a>

<a href="#" class="card">
<span>🇬🇧</span>
<h2>اللغة الإنجليزية</h2>
</a>

<a href="#" class="card">
<span>🌍</span>
<h2>التاريخ والجغرافيا</h2>
</a>

<a href="#" class="card">
<span>☪️</span>
<h2>التربية الإسلامية</h2>
</a>

<a href="#" class="card">
<span>💭</span>
<h2>الفلسفة</h2>
</a>

</div>

<a class="back" href="bac.html">⬅ العودة للشعب</a>

</body>
</html>
