<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شعب البكالوريا | Youcef Exam</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#eef5ff,#ffffff);
}

header{
background:#2563eb;
padding:25px;
text-align:center;
color:white;
font-size:35px;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.desc{
text-align:center;
color:#555;
font-size:18px;
margin:20px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
text-decoration:none;
color:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
transition:.3s;
text-align:center;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
}

.card span{
font-size:60px;
display:block;
margin-bottom:15px;
}

.card h2{
font-size:26px;
}

.science{background:#2563eb;}
.math{background:#7c3aed;}
.tech{background:#f59e0b;}
.manage{background:#10b981;}
.literature{background:#ef4444;}
.lang{background:#0ea5e9;}

.back{
display:block;
width:220px;
margin:35px auto;
padding:15px;
text-align:center;
background:#111827;
color:white;
text-decoration:none;
border-radius:12px;
transition:.3s;
}

.back:hover{
background:black;
}
</style>

</head>

<body>

<header>
🎓 شعب البكالوريا
</header>

<p class="desc">
اختر الشعبة التي تريدها
</p>

<div class="container">

<a href="science.html" class="card science">
<span>🧪</span>
<h2>علوم تجريبية</h2>
</a>

<a href="#" class="card math">
<span>📐</span>
<h2>رياضيات</h2>
</a>

<a href="#" class="card tech">
<span>⚙️</span>
<h2>تقني رياضي</h2>
</a>

<a href="#" class="card manage">
<span>💼</span>
<h2>تسيير واقتصاد</h2>
</a>

<a href="#" class="card literature">
<span>📚</span>
<h2>آداب وفلسفة</h2>
</a>

<a href="#" class="card lang">
<span>🌍</span>
<h2>لغات أجنبية</h2>
</a>

</div>

<a class="back" href="index.html">⬅ العودة للرئيسية</a>

</body>
</html>
